---
- name: Ensure Docker containers are up-and-running
  gather_facts: false
  hosts: docker_containers

  pre_tasks:
    - name: Ensure container is started
      community.docker.docker_container:
        command: sleep infinity
        image: "{{ container_image }}"
        name: "{{ inventory_hostname }}"
        pull: "{{ not is_nixos_image }}"
        state: started
        privileged: "{{ is_nixos_image }}"
        security_opts: "{{ ['seccomp=unconfined', 'apparmor=unconfined'] if is_nixos_image else omit }}"
      delegate_to: localhost

    - name: Wait for container to be ready
      community.docker.docker_container_info:
        name: "{{ inventory_hostname }}"
      register: container_info
      until:
        - container_info is defined
        - (container_info.container | default({})).get('State', {}).get('Running', false) | bool
      delegate_to: localhost
      changed_when: false

  tags: always
  vars:
    nixos_built_image: wine-nixos:molecule
    container_image_map:
      wine-on-alpine-latest: alpine:3.20
      wine-on-debian-latest: debian:latest
      wine-on-nixos-latest: "{{ nixos_built_image }}"
      wine-on-ubuntu-jammy: ubuntu:jammy
      wine-on-ubuntu-latest: ubuntu:latest
      wine-on-ubuntu-noble: ubuntu:noble
    container_image: "{{ container_image_map[inventory_hostname] | default('ubuntu:latest') }}"
    is_nixos_image: "{{ inventory_hostname == 'wine-on-nixos-latest' }}"
  vars_files:
    - ../../../vars/main.yml

- name: Import ea31337.wine role (wine-verify tag)
  hosts: docker_containers
  gather_facts: true
  tasks:
    - name: Import ea31337.wine role
      ansible.builtin.import_role:
        name: ea31337.wine
  tags: wine-verify

  post_tasks:
    - name: Stop Docker containers
      community.docker.docker_container:
        name: "{{ inventory_hostname }}"
        state: stopped
      delegate_to: localhost
      failed_when: false

  vars:
    wine_install_winetricks: true
