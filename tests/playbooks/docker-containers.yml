---
- name: Build NixOS Docker image
  hosts: localhost
  gather_facts: false
  tags: always
  vars:
    controller_python: "{{ ansible_playbook_python }}"
    nixos_built_image: wine-nixos:molecule
    target_container: "{{ lookup('env', 'TARGET_CONTAINER') | default('', true) }}"
    is_nixos_target: "{{ target_container in ['', 'wine-on-nixos-latest'] }}"
    nixos_in_inventory: "{{ 'wine-on-nixos-latest' in groups.get('docker_containers', []) }}"
    should_build_nixos: "{{ is_nixos_target and nixos_in_inventory }}"
    nixos_build_dir: "{{ lookup('env', 'RUNNER_TEMP') | default('/tmp', true) }}"
    nixos_dockerfile_output: "{{ nixos_build_dir }}/Dockerfile.wine-on-nixos"
    nixos_dockerfile_template: >-
      {{ playbook_dir }}/../../molecule/resources/playbooks/Dockerfile.j2
  vars_files:
    - ../../vars/main.yml
  tasks:
    - name: Render Dockerfile for NixOS image
      ansible.builtin.template:
        src: "{{ nixos_dockerfile_template }}"
        dest: "{{ nixos_dockerfile_output }}"
        mode: "0644"
      vars:
        item:
          name: wine-on-nixos-latest
          image: nixos/nix:latest
        ansible_python_interpreter: "{{ controller_python }}"
      when: should_build_nixos | bool

    - name: Create ca-certificates directory in build context
      ansible.builtin.file:
        path: "{{ nixos_dockerfile_output | dirname }}/ca-certificates"
        state: directory
        mode: "0755"
      when: should_build_nixos | bool

    - name: Build NixOS image with Python preinstalled
      community.docker.docker_image:
        name: wine-nixos:molecule
        build:
          path: "{{ nixos_dockerfile_output | dirname }}"
          dockerfile: "{{ nixos_dockerfile_output | basename }}"
        source: build
        force_source: true
      when: should_build_nixos | bool
      vars:
        ansible_python_interpreter: "{{ controller_python }}"
      no_log: "{{ wine_no_log }}"

- name: Configure Docker container
  hosts: docker_containers
  gather_facts: false
  vars:
    controller_python: "{{ ansible_playbook_python }}"
    container_image_map:
      wine-on-alpine-latest: alpine:3.20
      wine-on-debian-latest: debian:latest
      wine-on-nixos-latest: wine-nixos:molecule
      wine-on-ubuntu-jammy: ubuntu:jammy
      wine-on-ubuntu-noble: ubuntu:noble
    container_image: "{{ container_image_map[inventory_hostname] | default('ubuntu:latest') }}"
  vars_files:
    - ../../vars/main.yml

  pre_tasks:
    - name: Ensure container is started
      community.docker.docker_container:
        name: "{{ inventory_hostname }}"
        image: "{{ container_image }}"
        state: started
        command: sleep infinity
        # NixOS containers require privileged mode due to non-standard filesystem layout.
        privileged: "{{ container_image is search('nixos') }}"
        pull: "{{ not (container_image is search('nixos')) }}"
        # Don't recreate - just restart if needed
        recreate: false
        restart: false
        # Relaxed seccomp/apparmor for NixOS compatibility.
        security_opts: "{{
          ['seccomp=unconfined', 'apparmor=unconfined']
          if container_image is search('nixos') else omit }}"
      delegate_to: localhost
      vars:
        # Use system Python with requests installed for controller-side Docker modules.
        ansible_python_interpreter: "{{ controller_python }}"
      no_log: "{{ wine_no_log }}"

    - name: Wait for container to be ready
      community.docker.docker_container_info:
        name: "{{ inventory_hostname }}"
      register: container_info
      until:
        - container_info is defined
        - (container_info.container | default({})).get('State', {}).get('Running', false) | bool
      changed_when: false
      delay: 2
      delegate_to: localhost
      retries: 10
      vars:
        # Use system Python with requests installed for controller-side Docker modules.
        ansible_python_interpreter: "{{ controller_python }}"
      no_log: "{{ wine_no_log }}"

    - name: Install Python 3 on Alpine
      ansible.builtin.raw: |
        missing=""
        [ -e "{{ ansible_python_interpreter }}" ] || missing="$missing python3 py3-pip"
        command -v sudo >/dev/null 2>&1 || missing="$missing sudo"
        command -v bash >/dev/null 2>&1 || missing="$missing bash"
        command -v ps   >/dev/null 2>&1 || missing="$missing procps"
        if [ -n "$missing" ]; then apk update -q && apk add -q --no-cache $missing; fi
      changed_when: false
      when: container_image is search("alpine")

    - name: Install Python 3 on Ubuntu/Debian
      ansible.builtin.raw: |
        missing=""
        [ -e "{{ ansible_python_interpreter }}" ] || missing="$missing python3 python3-pip"
        command -v sudo >/dev/null 2>&1 || missing="$missing sudo"
        command -v ps   >/dev/null 2>&1 || missing="$missing procps"
        if [ -n "$missing" ]; then
          apt-get update -qq && apt-get install -y -qq --no-install-recommends $missing
        fi
      changed_when: false
      register: python_install_result
      retries: 3
      delay: 10
      until: python_install_result.rc == 0
      when: container_image is search("ubuntu") or container_image is search("debian")

    - name: Install or verify Python on NixOS
      ansible.builtin.raw: |
        PATH=/root/.nix-profile/bin:/nix/var/nix/profiles/default/bin:/run/current-system/sw/bin:$PATH
        missing_packages=""
        command -v python3 >/dev/null 2>&1 || missing_packages="$missing_packages nixpkgs.python3"
        if ! command -v pip3 >/dev/null 2>&1 && ! command -v pip >/dev/null 2>&1; then
          missing_packages="$missing_packages nixpkgs.python3Packages.pip"
        fi
        command -v sudo >/dev/null 2>&1 || missing_packages="$missing_packages nixpkgs.sudo"
        command -v ps >/dev/null 2>&1 || missing_packages="$missing_packages nixpkgs.procps"

        if [ -n "$missing_packages" ]; then
          nix-channel --update > /dev/null
          nix-env -iA $missing_packages > /dev/null
        fi
        python3 --version
      changed_when: false
      when: container_image is search("nixos")

    - name: Gather facts
      ansible.builtin.setup:

    - name: Determine if we should become root
      ansible.builtin.set_fact:
        wine_should_become: "{{ (ansible_facts.get('user_uid') | default(0) | int) != 0 }}"
        cacheable: true

    - name: Install Python packages for Ubuntu/Debian
      ansible.builtin.apt:
        name:
          - python3
          - python3-pip
          - python3-setuptools
        state: present
        update_cache: true
      become: "{{ wine_should_become }}"
      environment:
        DEBIAN_FRONTEND: noninteractive
      when: container_image is search("ubuntu") or container_image is search("debian")
      no_log: "{{ wine_no_log }}"

  tags: always

- name: Install ea31337.wine role on all containers
  hosts: docker_containers
  gather_facts: true
  become: "{{ wine_should_become | default(false) }}"
  tags: always
  vars:
    controller_python: "{{ ansible_playbook_python }}"
    wine_install_winetricks: true
  vars_files:
    - ../../vars/main.yml
  tasks:
    - name: Installs ea31337.wine role
      ansible.builtin.import_role:
        name: ea31337.wine

  post_tasks:
    - name: Stop Docker containers
      community.docker.docker_container:
        name: "{{ inventory_hostname }}"
        state: stopped
      delegate_to: localhost
      failed_when: false
      no_log: "{{ wine_no_log }}"
