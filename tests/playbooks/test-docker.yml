---
- name: Configure Docker container
  # Note: Since facts are not gathered, we're checking for ansible_facts.get('user_id'), connection_user or UID instead.
  become: >-
    {{
      (connection_user | default('root')) != 'root'
      or (ansible_facts.get('user_id', 'root')) != 'root'
      or (ansible_facts.get('user_uid', lookup('ansible.builtin.env', 'UID') | default(0)) | int) != 0
      or (ansible_facts.get('env', {}).get('UID', lookup('ansible.builtin.env', 'UID') | default(0)) | int != 0)
      or (
        ansible_facts.get('env', {}).get('USER',
        ansible_facts.get('env', {}).get('LOGNAME', 'root'))
        != 'root'
      )
    }}
  # Use su as become_method as sudo is not available in all containers.
  become_method: ansible.builtin.su
  gather_facts: false
  hosts: docker_containers

  vars:
    wine_test_image: "ghcr.io/ea31337/ansible-role-wine:latest"
  vars_files:
    - ../../vars/main.yml

  pre_tasks:
    - name: Manage Docker container lifecycle
      delegate_to: localhost
      vars:
        ansible_python_interpreter: "{{ ansible_playbook_python }}"
      block:
        - name: Ensure container is started
          community.docker.docker_container:
            name: "{{ inventory_hostname }}"
            image: "{{ wine_test_image }}"
            state: started
            command: sleep infinity
            recreate: true
            pull: true
          no_log: "{{ wine_no_log }}"

        - name: Wait for container to be ready
          community.docker.docker_container_info:
            name: "{{ inventory_hostname }}"
          register: container_info
          until:
            - container_info is defined
            - container_info.container.State.Running | default(false) | bool
          changed_when: false
          delay: 2
          retries: 10
          no_log: "{{ wine_no_log }}"

- name: Install ea31337.wine role on the container
  hosts: docker_containers
  become_method: ansible.builtin.su
  gather_facts: false
  vars_files:
    - ../../vars/main.yml
  tasks:
    - name: Bootstrap Python 3
      ansible.builtin.raw: |
        if command -v python3 >/dev/null 2>&1; then
          exit 0
        fi
        if command -v apk >/dev/null 2>&1; then
          apk update -q && apk add -q --no-cache python3 sudo bash ca-certificates
        elif command -v apt-get >/dev/null 2>&1; then
          apt-get update -qq && apt-get install -y -qq --no-install-recommends python3 sudo ca-certificates
        elif command -v nix-env >/dev/null 2>&1; then
          nix-channel --update > /dev/null
          nix-env -iA nixpkgs.python3 nixpkgs.sudo > /dev/null
        fi
      changed_when: false

    - name: Discover Python interpreter
      ansible.builtin.raw: |
        if [ -x /root/.nix-profile/bin/python3 ]; then
          echo "/root/.nix-profile/bin/python3"
        elif [ -x /usr/bin/python3 ]; then
          echo "/usr/bin/python3"
        else
          command -v python3
        fi
      register: discovered_python
      changed_when: false

    - name: Set ansible_python_interpreter
      ansible.builtin.set_fact:
        ansible_python_interpreter: "{{ discovered_python.stdout | trim }}"
      when: discovered_python.stdout | trim

    - name: Gather facts
      ansible.builtin.setup:

    - name: Determine if we should become root
      ansible.builtin.set_fact:
        wine_should_become: >-
          {{ (ansible_facts.get('user_uid') | default(0) | int) != 0 }}

    - name: Installs ea31337.wine role
      ansible.builtin.import_role:
        name: ea31337.wine
      become: "{{ wine_should_become }}"

  post_tasks:
    - name: Stop Docker containers
      community.docker.docker_container:
        name: "{{ inventory_hostname }}"
        state: absent
      delegate_to: localhost
      failed_when: false
      vars:
        ansible_python_interpreter: "{{ ansible_playbook_python }}"
      no_log: "{{ wine_no_log }}"
