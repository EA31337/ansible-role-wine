---
- name: Ensure Winetricks dependencies are installed
  become: "{{ ansible_facts['user_id'] != 'root' }}"
  become_method: '{{ wine_become_method.get(ansible_facts["os_family"], wine_become_method["_default"]) }}'
  ansible.builtin.apt:
    name: "{{ wine_install_winetricks_dependencies }}"
    state: present
    update_cache: true
    install_recommends: false
  environment:
    DEBIAN_FRONTEND: noninteractive
  when: wine_install_winetricks | bool

- name: Apt cleanup
  become: "{{ ansible_facts['user_id'] != 'root' }}"
  become_method: '{{ wine_become_method.get(ansible_facts["os_family"], wine_become_method["_default"]) }}'
  when: wine_install_winetricks | bool
  block:

    - name: Removes dependencies that are no longer required
      ansible.builtin.apt:
        autoremove: true
        purge: true
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: Cleans Apt cache
      ansible.builtin.apt:
        autoclean: true
        clean: true
      environment:
        DEBIAN_FRONTEND: noninteractive
