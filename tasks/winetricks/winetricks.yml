---
- name: Ensures winetricks and dependencies are present
  become: "{{ ansible_facts.get('user_id', 'root') != 'root' }}"
  become_method: >-
    {{ wine_become_method.get(wine_detected_os_family | default(ansible_facts.get('os_family')),
    wine_become_method["_default"]) }}
  when: wine_install_winetricks | bool
  block:

    - name: Ensures winetricks is present ({{ wine_detected_os_family | default(ansible_facts.get('os_family')) }})
      ansible.builtin.include_tasks:
        apply:
          tags: winetricks
        file: >-
          winetricks-{{
          'Debian' if (wine_detected_os_family | default(ansible_facts.get('os_family'))) == 'Ubuntu'
          else (wine_detected_os_family | default(ansible_facts.get('os_family'))) }}.yml
      tags: winetricks

    - name: >-
        Install dependencies required by winetricks
        ({{ wine_detected_os_family | default(ansible_facts.get('os_family')) }})
      ansible.builtin.include_tasks:
        apply:
          tags: winetricks-deps
        file: >-
          install-deps-{{
          'Debian' if (wine_detected_os_family | default(ansible_facts.get('os_family'))) == 'Ubuntu'
          else (wine_detected_os_family | default(ansible_facts.get('os_family'))) }}.yml
      tags: winetricks-deps
      when:
        - wine_selected_winetricks_dependencies | length > 0
