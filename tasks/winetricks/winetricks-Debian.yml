---

- name: Gets ID of the distribution
  changed_when: false
  ansible.builtin.command: /usr/bin/lsb_release -si
  register: lsb_release_dist_id

- name: Ensures Winetricks is installed ({{ wine_detected_os_family | default(ansible_facts.get('os_family')) }})
  become: >-
    {{ ansible_facts.get('user_id', 'root') != 'root' or
    ansible_facts.get('env', {}).get('UID', lookup('ansible.builtin.env', 'UID') | default(0)) | int != 0 }}
  become_method: >-
    {{ wine_become_method.get(wine_detected_os_family | default(ansible_facts.get('os_family')),
    wine_become_method["_default"]) }}
  environment:
    DEBIAN_FRONTEND: noninteractive
  when: wine_install_winetricks | bool
  block:

    - name: Ensures Winetricks is present (Ubuntu)
      ansible.builtin.apt:
        install_recommends: "{{ 'yes' if wine_install_recommends else 'no' }}"
        name: winetricks
        state: present
        update_cache: true
      when: lsb_release_dist_id.stdout in ["Ubuntu"]

    - name: Ensures Winetricks is present via URL
      ansible.builtin.get_url:
        dest: /usr/local/bin/winetricks
        force: false
        mode: "0755"
        url: '{{ wine_winetricks_url }}'
      when:
        - wine_winetricks_url is defined
        - wine_winetricks_url | length > 0
