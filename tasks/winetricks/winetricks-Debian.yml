---

- name: Gets ID of the distribution
  changed_when: false
  ansible.builtin.command: /usr/bin/lsb_release -si
  register: lsb_release_dist_id

- name: Ensures Winetricks is installed ({{ wine_detected_os_family | default(ansible_os_family) }})
  become: >-
    {{ (ansible_user_id is defined and ansible_user_id != 'root')
    or (ansible_user_id is not defined and (lookup('env', 'UID') | int != 0)) }}
  become_method: >-
    {{ wine_become_method.get(wine_detected_os_family | default(ansible_os_family),
    wine_become_method["_default"]) }}
  environment:
    DEBIAN_FRONTEND: noninteractive
  when: wine_install_winetricks | bool
  block:

    - name: Ensures Winetricks is present (Ubuntu)
      ansible.builtin.apt:
        install_recommends: "{{ 'yes' if wine_install_recommends else 'no' }}"
        name: winetricks
        state: present
        update_cache: true
      when: lsb_release_dist_id.stdout in ["Ubuntu"]

    - name: Ensures Winetricks is present via URL
      ansible.builtin.get_url:
        dest: /usr/local/bin/winetricks
        force: false
        mode: "0755"
        url: '{{ wine_winetricks_url }}'
      when:
        - wine_winetricks_url is defined
        - wine_winetricks_url | length > 0
