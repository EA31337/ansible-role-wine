---
- name: Ensures that winetricks dependencies are installed
  become: "{{ ansible_user_id != 'root' }}"
  become_method: >-
    {{ wine_become_method.get(wine_detected_os_family | default(ansible_os_family),
    wine_become_method["_default"]) }}
  block:

    - name: Check if Nix store exists
      ansible.builtin.stat:
        path: /nix/store
      register: nix_store_stat

    - name: Get HOME of the privileged user
      ansible.builtin.command: printenv HOME
      register: privileged_home
      changed_when: false
      check_mode: false

    - name: Ensures binary-backed dependencies are present
      ansible.builtin.command:
        cmd: nix-env -iA nixpkgs.{{ item }}
        creates: >-
          {{ privileged_home.stdout ~ '/.nix-profile/bin/' ~ wine_package_command_map[item] }}
      when:
        - nix_store_stat.stat.exists
        - wine_package_command_map[item] | default('') | length > 0
      loop: "{{ wine_selected_winetricks_dependencies }}"

    - name: Check if data-only dependencies are already installed
      ansible.builtin.command:
        cmd: nix-env -q {{ wine_data_pkg_map[item] | default(item) }}
      register: nix_data_dep_check
      when:
        - nix_store_stat.stat.exists
        - wine_package_command_map[item] | default('') | length == 0
      changed_when: false
      failed_when: false
      loop: "{{ wine_selected_winetricks_dependencies }}"

    - name: Ensures data-only dependencies are present
      ansible.builtin.command:
        cmd: nix-env -iA nixpkgs.{{ item.item }}
      register: nix_data_install
      when:
        - nix_store_stat.stat.exists
        - item.rc is defined
        - item.rc != 0
      changed_when: nix_data_install.rc == 0
      loop: "{{ nix_data_dep_check.results | default([]) }}"
