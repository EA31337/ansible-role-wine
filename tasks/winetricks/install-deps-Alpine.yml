---
- name: Ensures that dependencies are installed
  become: "{{ ansible_facts['user_id'] != 'root' }}"
  become_method: '{{ wine_become_method.get(ansible_facts["os_family"], wine_become_method["_default"]) }}'
  block:

    - name: Install winetricks dependencies (Alpine)
      ansible.builtin.package:
        name: "{{ wine_install_winetricks_dependencies }}"
        state: present
