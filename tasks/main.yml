---
- name: Early checks and OS detection
  tags: [always, wine]
  block:
    - name: Check for Wine command
      ansible.builtin.command: which wine
      register: cmd_which_wine_res
      changed_when: false
      failed_when: cmd_which_wine_res.rc > 1

    - name: Check for NixOS (nix-env)
      ansible.builtin.command: which nix-env
      register: nixos_early_check
      changed_when: false
      failed_when: false

    - name: Set detected_os_family fact
      ansible.builtin.set_fact:
        detected_os_family: >-
          {{ 'NixOS' if (nixos_early_check.rc | default(1) == 0 or ansible_os_family == 'NixOS')
          else (ansible_distribution if ansible_distribution == 'Ubuntu' else ansible_os_family) }}
        cacheable: true

- name: OS-specific Wine version detection
  tags: wine
  when:
    - detected_os_family == 'NixOS'
    - nixos_early_check.rc | default(1) == 0
  block:
    - name: Check current Wine version on NixOS
      ansible.builtin.shell: |
        set -o pipefail
        nix-env -q 2>/dev/null | grep -E '^wine-(wow64|wow|10|9|11)' | head -1 || echo "not_installed"
      register: nixos_wine_version_check
      changed_when: false

    - name: Determine if Wine version mismatch on NixOS
      ansible.builtin.set_fact:
        wine_version_mismatch: >-
          {% set major = wine_version | default('') | regex_replace('^(\\d+).*', '\\1') | default('9') %}
          {{
            (nixos_wine_version_check.stdout | default('not_installed') == "not_installed") or
            ('wine-wow64-' ~ major not in nixos_wine_version_check.stdout) or
            ('wow64' not in nixos_wine_version_check.stdout)
          }}

- name: Ensures Wine is present
  ansible.builtin.include_tasks:
    file: wine/wine.yml
    apply:
      tags: wine
  register: wine_install_tasks
  when: cmd_which_wine_res.rc != 0 or (wine_version_mismatch | default(false) | bool)
  tags: wine

- name: Ensures Winetricks is present
  when: wine_install_winetricks | bool
  tags: [winetricks, winetricks-deps]
  block:
    - name: Checks if Winetricks is installed
      ansible.builtin.command: which winetricks
      register: cmd_which_winetricks_res
      check_mode: false
      changed_when: false
      failed_when: cmd_which_winetricks_res.rc > 1

    - name: Ensures Winetricks is present
      ansible.builtin.include_tasks: winetricks/winetricks.yml

    - name: Sets Windows version via winetricks
      ansible.builtin.command: winetricks -q {{ wine_winetricks_winver }}
      async: 20
      poll: 0
      changed_when: false
      when:
        - wine_winetricks_winver is defined
        - wine_winetricks_winver | length > 0

- name: Verify installation
  ansible.builtin.include_tasks:
    file: verify.yml
    apply:
      tags: wine-verify
  tags: wine-verify

- name: Checking wine version
  become: >-
    {{ (detected_os_family == 'NixOS')
    and (ansible_user_id != 'root') }}
  become_method: >-
    {{ wine_become_method.get(detected_os_family,
    wine_become_method["_default"]) }}
  ansible.builtin.shell: |
    {% if detected_os_family == 'NixOS' %}
    set -o pipefail
    installed=$(nix-env -q 2>/dev/null | grep -Em1 '^wine-(wow64|wow|10|9|11)' || echo "not_installed")
    echo "$installed"
    {% else %}
    wine --version
    {% endif %}
  register: wine_version_res
  changed_when: false
  when:
    - (cmd_which_wine_res.rc | default(1)) == 0
      or (wine_version_mismatch | default(false) | bool)
      or (detected_os_family == 'NixOS')
      or (wine_install_tasks is defined and not (wine_install_tasks.skipped | default(false)))
  tags: wine

- name: Display wine version
  ansible.builtin.debug:
    msg: "{{ wine_version_res.stdout | default('Wine not found or installation skipped') }}"
  tags: wine
