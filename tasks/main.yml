---
- name: Checks if Wine command exists
  changed_when: false
  ansible.builtin.command: which wine
  failed_when: cmd_which_wine_res.rc > 1
  register: cmd_which_wine_res
  tags: wine

- name: Check for NixOS (via nix-env command)
  ansible.builtin.command: which nix-env
  register: nixos_early_check
  changed_when: false
  failed_when: false
  tags: wine

- name: Check current Wine version on NixOS
  ansible.builtin.shell: nix-env -q wine64 2>/dev/null | head -1 || echo "not_installed"
  register: nixos_wine_version_check
  changed_when: false
  when: nixos_early_check.rc == 0
  tags: wine

- name: Determine if Wine version mismatch on NixOS
  ansible.builtin.set_fact:
    wine_version_mismatch: >-
      {{
        nixos_early_check.rc == 0 and
        wine_version is defined and
        wine_version | string == '9' and
        'wine64-9' not in (nixos_wine_version_check.stdout | default('not_installed'))
      }}
  tags: wine

- name: Ensures Wine is present
  ansible.builtin.include_tasks:
    apply:
      tags: wine
    file: wine/wine.yml
  tags: wine
  when: cmd_which_wine_res.rc != 0 or (wine_version_mismatch | default(false) | bool)

- name: Ensures Winetricks is present
  when: wine_install_winetricks | bool
  tags:
    - winetricks
    - winetricks-deps
  block:

    - name: Checks if Winetricks is installed
      ansible.builtin.command: which winetricks
      check_mode: false
      changed_when: false
      failed_when: cmd_which_winetricks_res.rc > 1
      register: cmd_which_winetricks_res

    - name: Ensures Winetricks is present
      ansible.builtin.include_tasks: winetricks/winetricks.yml
      when: cmd_which_winetricks_res.rc != 0

    - name: Sets Windows version via winetricks
      ansible.builtin.command: winetricks -q {{ wine_winetricks_winver }}
      async: 20
      changed_when: false
      poll: 0
      when:
        - cmd_which_winetricks_res.rc == 0
        - wine_winetricks_winver is defined
        - wine_winetricks_winver | length > 0

- name: Verify installation
  ansible.builtin.include_tasks:
    apply:
      tags: wine-verify
    file: verify.yml
  tags: wine-verify

- name: Checking wine version
  become: "{{ detected_os_family | default(ansible_facts['os_family']) == 'NixOS' and ansible_facts['user_id'] != 'root' }}"
  become_method: ansible.builtin.su
  changed_when: false
  ansible.builtin.shell: |
    {% if detected_os_family | default(ansible_facts['os_family']) == 'NixOS' %}
    nix-env -q wine64 | head -1
    {% else %}
    wine --version
    {% endif %}
  register: wine_version_res
  tags: wine

- name: Display wine version
  ansible.builtin.debug:
    msg: "{{ wine_version_res.stdout }}"
  tags: wine
