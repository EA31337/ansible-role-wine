---
- name: Ensures Wine is present
  become: true
  become_method: >-
    {{ wine_become_method.get(detected_os_family | default(ansible_os_family),
    wine_become_method["_default"]) }}
  block:

    - name: Update apk cache
      ansible.builtin.command: apk update
      changed_when: false

    - name: Query available wine versions
      ansible.builtin.command: apk search -v -e wine
      register: wine_available_version
      changed_when: false
      failed_when: false

    - name: Extract version info from available wine
      ansible.builtin.set_fact:
        wine_alpine_version: >-
          {{ wine_available_version.stdout | default('')
          | regex_search('wine-([\d.]+-r\d+)', '\1') | default('', true) }}

    - name: Extract major version from wine_alpine_version
      ansible.builtin.set_fact:
        wine_alpine_major: >-
          {{ wine_alpine_version | regex_replace('^(\d+).*', '\1') }}
      when: wine_alpine_version | length > 0

    - name: Validate wine major version (9, 10, or 11)
      ansible.builtin.assert:
        that:
          - wine_alpine_major is defined
          - wine_alpine_major in ['9', '10', '11']
        fail_msg: >-
          Available wine version {{ wine_alpine_major | default('unknown') }}
          is not supported (expected 9, 10, or 11).
      when: wine_alpine_version | length > 0

    - name: Validate requested wine version matches available
      ansible.builtin.assert:
        that:
          - wine_alpine_major == (wine_version | regex_replace('^(\d+).*', '\1'))
        fail_msg: >-
          Requested wine version {{ wine_version }} does not match available
          version {{ wine_alpine_version }}
        success_msg: "Wine version {{ wine_alpine_major }} matches requested {{ wine_version }}"
      when:
        - wine_version is defined
        - wine_version | length > 0
        - wine_alpine_version | length > 0

    - name: Ensures Wine and runtime dependencies are present ({{ ansible_os_family }})
      ansible.builtin.package:
        name:
          - fontconfig
          - p7zip
          - ttf-freefont
          - >-
            {{ 'wine=' ~ wine_alpine_version
            if (wine_alpine_version is defined
            and wine_alpine_version | length > 0)
            else 'wine' }}
          - xauth
          - xvfb-run
        state: present

- name: Ensure fontconfig directories are present (Alpine)
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ wine_fontconfig_cache_dir }}"
    - "{{ wine_fontconfig_config_dir }}"
    - "{{ wine_fontconfig_fonts_dirs[0] }}"
    - "{{ wine_fontconfig_fonts_dirs[1] }}"

- name: Set fontconfig_path fact for Alpine
  ansible.builtin.set_fact:
    fontconfig_path: ""

- name: Write fontconfig config for Alpine
  ansible.builtin.template:
    src: fonts.conf.j2
    dest: "{{ ansible_facts.env.HOME }}/{{ wine_fontconfig_config_file }}"
    mode: '0644'
    force: true

- name: Write fontconfig and wine environment config for Alpine
  ansible.builtin.template:
    src: wine_env.j2
    dest: "{{ item.dest }}"
    mode: '0644'
  become: "{{ item.become | default(false) }}"
  loop:
    - { dest: "{{ ansible_facts.env.HOME }}/.wine_env" }
    - { dest: "/etc/profile.d/wine.sh", become: true }

- name: Set fontconfig environment in ~/.bashrc (Alpine)
  ansible.builtin.lineinfile:
    path: "{{ ansible_facts.env.HOME }}/.bashrc"
    line: "[[ -f ~/.wine_env ]] && source ~/.wine_env"
    create: true
    mode: '0644'

- name: Rebuild fontconfig cache for Alpine
  ansible.builtin.command: >-
    fc-cache -f
    {{ ansible_facts.env.HOME }}/{{ wine_fontconfig_fonts_dirs[0] }}
    {{ ansible_facts.env.HOME }}/{{ wine_fontconfig_fonts_dirs[1] }}
  changed_when: false

- name: Ensures ~/.wine is initialized
  ansible.builtin.command: xvfb-run -a wineboot --init
  environment:
    # WoW64 wine (amd64) only supports win64; 32-bit wine (i686/x86/etc) only supports win32.
    WINEARCH: >-
      {{ 'win32' if ansible_facts.architecture in ['i386', 'i486', 'i586', 'i686', 'x86'] else 'win64' }}
    HOME: "{{ ansible_facts.env.HOME }}"
    FONTCONFIG_FILE: "{{ ansible_facts.env.HOME }}/{{ wine_fontconfig_config_file }}"
    FONTCONFIG_PATH: >-
      {{ ansible_facts.env.HOME }}/{{ wine_fontconfig_config_dir }}:{{
      wine_fontconfig_system_config_path }}
    WINEDEBUG: "{{ wine_debug | default('-all') }}"
    WINEDLLOVERRIDES: "{{ wine_dlloverrides | default('mscoree,mshtml=') }}"
  args:
    creates: "{{ ansible_facts.env.HOME }}/.wine/system.reg"
  timeout: 120
