---
- name: Ensures Wine is present
  become: true
  become_method: ansible.builtin.su
  block:

    - name: Update apk cache
      ansible.builtin.command: apk update
      changed_when: false

    - name: Query available wine versions
      ansible.builtin.shell: |
        set -o pipefail
        apk search -e wine | grep '^wine-' | head -1
      register: wine_available_version
      changed_when: false
      failed_when: false

    - name: Extract major version from available wine
      ansible.builtin.set_fact:
        wine_alpine_major: "{{ wine_available_version.stdout | regex_search('wine-([0-9]+)', '\\1') | first }}"
      when: wine_available_version.stdout | length > 0

    - name: Validate wine major version (9, 10, or 11)
      ansible.builtin.assert:
        that:
          - wine_alpine_major is defined
          - wine_alpine_major in ['9', '10', '11']
        fail_msg: >-
          Available wine version {{ wine_alpine_major | default('unknown') }}
          not in acceptable range (9, 10, or 11)
        success_msg: "Wine version {{ wine_alpine_major }} is acceptable"
      when: wine_version is defined and wine_version | length > 0

    - name: Ensures Wine is present ({{ ansible_os_family }})
      ansible.builtin.package:
        name: wine
        state: present

    - name: Ensures fontconfig package is present
      ansible.builtin.package:
        name: fontconfig
        state: present

    - name: Ensures font packages are present
      ansible.builtin.package:
        name: ttf-freefont
        state: present

    - name: Ensures p7zip package is present
      ansible.builtin.package:
        name: p7zip
        state: present

    - name: Ensures Xvfb packages are present (headless Wine init)
      ansible.builtin.package:
        name:
          - xvfb-run
          - xauth
        state: present

- name: Ensure fontconfig directories are present (Alpine)
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ ansible_facts.env.HOME }}/.config/fontconfig"
    - "{{ ansible_facts.env.HOME }}/.cache/fontconfig"
    - "{{ ansible_facts.env.HOME }}/.fonts"

- name: Write fontconfig config for Alpine
  ansible.builtin.copy:
    dest: "{{ ansible_facts.env.HOME }}/.config/fontconfig/fonts.conf"
    mode: '0644'
    force: false
    content: |
      <?xml version="1.0"?>
      {{ '<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">' }}
      <fontconfig>
        <dir>/usr/share/fonts</dir>
        <dir prefix="default">{{ ansible_facts.env.HOME }}/.fonts</dir>
        <dir prefix="default">{{ ansible_facts.env.HOME }}/.local/share/fonts</dir>
        <cachedir prefix="default">{{ ansible_facts.env.HOME }}/.cache/fontconfig</cachedir>
        <include ignore_missing="yes">/etc/fonts/fonts.conf</include>
        <config><rescan><int>30</int></rescan></config>
      </fontconfig>

- name: Set fontconfig environment in ~/.bashrc (Alpine)
  ansible.builtin.blockinfile:
    path: "{{ ansible_facts.env.HOME }}/.bashrc"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - Wine fontconfig"
    block: |
      export FONTCONFIG_FILE={{ ansible_facts.env.HOME }}/.config/fontconfig/fonts.conf
      export FONTCONFIG_PATH={{ ansible_facts.env.HOME }}/.config/fontconfig:/etc/fonts
    create: true
    mode: '0644'

- name: Write wine_env for Alpine
  ansible.builtin.copy:
    dest: "{{ ansible_facts.env.HOME }}/.wine_env"
    mode: '0644'
    content: |
      export FONTCONFIG_FILE={{ ansible_facts.env.HOME }}/.config/fontconfig/fonts.conf
      export FONTCONFIG_PATH={{ ansible_facts.env.HOME }}/.config/fontconfig:/etc/fonts

- name: Rebuild fontconfig cache for Alpine
  ansible.builtin.command: >-
    fc-cache -f
    {{ ansible_facts.env.HOME }}/.fonts
    {{ ansible_facts.env.HOME }}/.local/share/fonts
    {{ ansible_facts.env.HOME }}/.cache/fontconfig
  changed_when: false
  failed_when: false

- name: Ensures ~/.wine is initialized
  ansible.builtin.command: xvfb-run -a wineboot --init
  environment:
    # WoW64 wine (amd64) only supports win64; 32-bit wine (i686) only supports win32.
    WINEARCH: "{{ 'win32' if ansible_facts.architecture == 'i686' else 'win64' }}"
    HOME: "{{ ansible_facts.env.HOME }}"
    FONTCONFIG_FILE: "{{ ansible_facts.env.HOME }}/.config/fontconfig/fonts.conf"
    FONTCONFIG_PATH: "{{ ansible_facts.env.HOME }}/.config/fontconfig:/etc/fonts"
    WINEDEBUG: "{{ wine_debug | default('-all') }}"
    WINEDLLOVERRIDES: "{{ wine_dlloverrides | default('mscoree,mshtml=') }}"
  args:
    creates: "{{ ansible_facts.env.HOME }}/.wine/system.reg"
  changed_when: false
