# yamllint disable rule:line-length
---
wine_install_recommends: false
wine_install_winetricks: false
wine_install_winetricks_dependencies:
  - cabextract
  - curl
  - gawk
  - p7zip
  - unzip
# Wine package release to install.
# Stable, devel, or staging (for winehq packages).
wine_release: stable
# Override Ubuntu/Debian release codename for Wine repository.
# Use this to install older Wine versions from previous release repos.
# Example: 'jammy' for Ubuntu 22.04 to get Wine 10.x on newer Ubuntu.
wine_release_codename: ""
# Specific Wine package version to install (optional).
# If set, installs exact version instead of latest from wine_release.
# Example: '10.0.0.0~jammy-1' to install Wine 10.0.0 from jammy repo.
wine_version: ""
wine_winetricks_apt_install: false
wine_winetricks_url: https://raw.githubusercontent.com/Winetricks/winetricks/master/src/winetricks
wine_winetricks_winver: win10
