---
name: Test

# yamllint disable-line rule:truthy
on:
  pull_request:
    paths-ignore:
      - '.github/workflows/**'
      - '**/*.cfg'
      - '**/*.md'
      - '.*'
      - Pipfile*
  push:
    paths-ignore:
      - '.github/workflows/**'
      - '**/*.cfg'
      - '**/*.md'
      - '.*'
      - Pipfile*

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  test:
    name: Test (${{ matrix.container }})
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        container:
          - wine-on-alpine-latest
          - wine-on-debian-latest
          - wine-on-nixos-latest
          - wine-on-ubuntu-jammy
          - wine-on-ubuntu-latest
          - wine-on-ubuntu-noble
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      TARGET_CONTAINER: ${{ matrix.container }}
    steps:
      - uses: actions/checkout@v6
        with:
          path: ${{ github.repository }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: >-
            ${{ runner.os }}-pip-${{ hashFiles(
              format('{0}/Pipfile*', github.repository),
              format('{0}/.devcontainer/requirements.txt', github.repository)
            ) }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python's requirements
        run: pip install -r .devcontainer/requirements.txt
        working-directory: ${{ github.repository }}

      - name: Cache Ansible Galaxy collections
        uses: actions/cache@v4
        with:
          key: ${{ runner.os }}-galaxy-${{ hashFiles(format('{0}/requirements.yml', github.repository)) }}
          path: ~/.ansible/collections
          restore-keys: |
            ${{ runner.os }}-galaxy-
      - name: Install Ansible Galaxy requirements
        run: |
          ansible-galaxy collection install -r requirements.yml
          ansible-galaxy install -r requirements.yml
        working-directory: ${{ github.repository }}

      - name: Install Ansible Galaxy local requirements
        run: |
          jinja2 requirements-local.yml.j2 -D "pwd=$PWD" -o requirements-local.yml
          ansible-galaxy install -r requirements-local.yml && rm requirements-local.yml
        working-directory: ${{ github.repository }}

      - name: Check Ansible syntax
        run: >-
            ansible-playbook --syntax-check
            -i tests/inventory/docker-containers.yml
            tests/playbooks/docker-containers.yml
            tests/playbooks/tags/wine-verify.yml
            --limit "${TARGET_CONTAINER},localhost"
            --verbose
        working-directory: ${{ github.repository }}

      - name: Run Ansible lint
        run: ansible-lint tests/playbooks/docker-containers.yml tests/playbooks/tags/wine-verify.yml
        working-directory: ${{ github.repository }}

      - name: Run Ansible playbook
        run: >-
          ansible-playbook -i tests/inventory/docker-containers.yml
          --limit "${TARGET_CONTAINER},localhost"
          tests/playbooks/docker-containers.yml
        working-directory: ${{ github.repository }}

      - name: Run Ansible playbook with wine-verify tag
        run: >-
          ansible-playbook -i tests/inventory/docker-containers.yml
          --limit "${TARGET_CONTAINER},localhost"
          tests/playbooks/tags/wine-verify.yml
        working-directory: ${{ github.repository }}

      # Debug with tmate on failure when debug logging is enabled.
      - if: ${{ failure() && runner.debug == '1' }}
        uses: mxschmitt/action-tmate@v3
    timeout-minutes: 20
