---
# Note: Keep keys and envs in alphabetical order.
name: OpenCode

# yamllint disable-line rule:truthy
on:
  issue_comment:
    types: [created, edited]
  pull_request_review_comment:
    types: [created, edited]
  issues:
    types: [opened]
  pull_request_review:
    types: [submitted]
  workflow_call:
    inputs:
      agent:
        description: Agent to use.
        required: false
        type: string
      model:
        description: Model to use for OpenCode
        required: false
        type: string
      issue_number:
        description: Issue or PR number for workflow_call triggers
        required: false
        type: number
      prompt:
        description: Custom prompt to override the default prompt
        required: false
        type: string
  workflow_dispatch:
    inputs:
      agent:
        description: Agent to use.
        required: false
        type: string
      model:
        description: Model to use for OpenCode
        required: false
        type: string
      issue_number:
        description: Issue or PR number for manual workflow execution
        required: false
        type: number
      prompt:
        description: Custom prompt to override the default prompt
        required: false
        type: string

permissions:
  actions: read
  contents: write
  id-token: write
  issues: write
  pull-requests: write

jobs:
  opencode:
    uses: EA31337/.github/.github/workflows/opencode.yml@master
    with:
      agent: >-
        ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call')
        && inputs.agent }}
      model: >-
        ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call')
        && inputs.model }}
      prompt: >-
        ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call')
        && inputs.prompt }}
      issue_number: >-
        ${{ github.event.issue.number || github.event.pull_request.number || inputs.issue_number }}
    secrets: inherit
