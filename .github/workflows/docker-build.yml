---
# Note: Keep keys and envs in alphabetical order.
name: Docker Build

on:
  pull_request:
  push:
    branches-ignore:
      - master

jobs:
  build:
    name: Build
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Python
        uses: actions/setup-python@v6.1.0
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v5
        with:
          key: ${{ runner.os }}-pip-${{ hashFiles('.devcontainer/requirements.txt') }}
          path: ~/.cache/pip
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r .devcontainer/requirements.txt

      - name: Render Dockerfile
        run: jinja2 Dockerfile.j2 -D docker_image="${{ matrix.image }}" > Dockerfile

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch,suffix=-${{ matrix.platform }}
            type=ref,event=pr,suffix=-${{ matrix.platform }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
          context: .
          labels: ${{ steps.meta.outputs.labels }}
          load: true
          platforms: ${{ matrix.arch }}
          push: false
          tags: ${{ steps.meta.outputs.tags }}

      - name: Test Docker image
        run: |
          TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n 1)
          docker run --rm --platform ${{ matrix.arch }} "$TAG" wine --version

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: linux/386
            image: i386/alpine:latest
            is_default: false
            platform: alpine-latest
          - arch: linux/amd64
            image: debian:latest
            is_default: false
            platform: debian-latest
          - arch: linux/amd64
            image: nixos/nix:latest
            is_default: false
            platform: nixos-latest
          - arch: linux/amd64
            image: ubuntu:jammy
            is_default: false
            platform: ubuntu-jammy
          - arch: linux/amd64
            image: ubuntu:noble
            is_default: true
            platform: ubuntu-noble
