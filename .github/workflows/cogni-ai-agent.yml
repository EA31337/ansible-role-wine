---
# See: <https://opencode.ai/docs>
name: Cogni AI Agent

# yamllint disable-line rule:truthy
on:
  issue_comment:
    types:
      - created
  pull_request_review_comment:
    types:
      - created
  workflow_dispatch:
    inputs:
      model:
        default: opencode/gpt-5-codex
        description: Model to use for OpenCode
        options:
          - opencode/big-pickle
          - opencode/claude-3-5-haiku
          - opencode/claude-haiku-4-5
          - opencode/claude-opus-4-5
          - opencode/claude-opus-4-6
          - opencode/claude-sonnet-4
          - opencode/claude-sonnet-4-5
          - opencode/claude-sonnet-4-6
          - opencode/gemini-3.1-pro
          - opencode/gemini-3-flash
          - opencode/gemini-3-pro
          - opencode/glm-5
          - opencode/glm-5.1
          - opencode/gpt-5
          - opencode/gpt-5-codex
          - opencode/gpt-5-nano
          - opencode/gpt-5.3-codex
          - opencode/gpt-5.3-codex-spark
          - opencode/gpt-5.4
          - opencode/gpt-5.4-mini
          - opencode/gpt-5.4-nano
          - opencode/minimax-m2.5
          - opencode/minimax-m2.5-free
          - opencode/nemotron-3-super-free
          - opencode/qwen3-coder
          - opencode/qwen3.6-plus-free
        required: true
        type: choice
      prompt:
        description: Prompt for the agent
        required: true
        type: string

jobs:
  cogni-ai-agent:
    if: |
      github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' || (
        github.event.sender.type != 'Bot' &&
        contains(fromJson('["COLLABORATOR","CONTRIBUTOR","MEMBER","OWNER"]'), github.event.comment.author_association)
        && (
          contains(github.event.comment.body, ' /oc ') ||
          startsWith(github.event.comment.body, '/oc ') ||
          endsWith(github.event.comment.body, ' /oc') ||
          github.event.comment.body == '/oc' ||
          contains(github.event.comment.body, ' /review ') ||
          startsWith(github.event.comment.body, '/review ') ||
          endsWith(github.event.comment.body, ' /review') ||
          github.event.comment.body == '/review' ||
          contains(github.event.comment.body, ' /opencode ') ||
          startsWith(github.event.comment.body, '/opencode ') ||
          endsWith(github.event.comment.body, ' /opencode') ||
          github.event.comment.body == '/opencode' ||
          contains(github.event.comment.body, '@opencode-agent') ||
          contains(github.event.comment.body, '@OpenCode-Agent')
        )
      )
    name: Run Cogni AI agent
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false  # Prevents Duplicate header: "Authorization" error.
      - name: Run Cogni AI Agent
        uses: Cogni-AI-OU/cogni-ai-agent-action@main
        with:
          model: ${{ inputs.model }}
          opencode-api-key: ${{ secrets.OPENCODE_API_KEY }}
          prompt: ${{ inputs.prompt }}
