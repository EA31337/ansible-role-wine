---
# Note: Keep keys and envs in alphabetical order.
name: Molecule

# yamllint disable-line rule:truthy
on:
  pull_request:
    paths-ignore:
      - '!.github/workflows/**'
      - '**.cfg'
      - '**.md'
      - '.*'
      - LICENSE
      - Pipfile*
  push:
    paths-ignore:
      - '!.github/workflows/**'
      - '**.cfg'
      - '**.md'
      - '.*'
      - LICENSE
      - Pipfile*

permissions:
  actions: write
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - default
          - devel
          - staging
          - winetricks
      max-parallel: 1
    steps:
      - uses: actions/checkout@v6
        with:
          path: ${{ github.repository }}
      - name: Show disk usage before cache cleanup
        run: |
          echo "=== Disk usage before cache cleanup ==="
          df -h
      - name: Free up disk space by removing unused tools
        run: |
          echo "=== Removing unused tools and caches ==="
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo rm -rf /opt/hostedtoolcache/go || true
          sudo rm -rf /opt/hostedtoolcache/Ruby || true
          sudo rm -rf /opt/hostedtoolcache/PyPy || true
          sudo rm -rf /opt/microsoft/msedge || true
          sudo rm -rf /opt/az || true
          sudo rm -rf /opt/google/chrome || true
        continue-on-error: true
      - name: Show disk usage after cache cleanup
        run: |
          echo "=== Disk usage after cache cleanup ==="
          df -h
      - uses: gofrolist/molecule-action@v2
        env:
          ANSIBLE_FORCE_COLOR: '1'
          ANSIBLE_STDOUT_CALLBACK: ${{ runner.debug == '1' && 'debug' || 'ansible.builtin.default' }}
          ANSIBLE_CALLBACK_RESULT_FORMAT: yaml
          MOLECULE_REPORT: molecule-${{ matrix.scenario }}-report.html
        with:
          molecule_args: >-
            --scenario-name ${{ matrix.scenario }}
          molecule_command: test
          molecule_options: ${{ runner.debug == '1' && '--verbose' || '' }}
          molecule_working_dir: ${{ github.repository }}
        continue-on-error: true
      - if: always()
        name: Ensure report file permissions are correct
        run: |
          sudo touch molecule-${{ matrix.scenario }}-report.html
          sudo chmod 644 molecule-${{ matrix.scenario }}-report.html
        working-directory: ${{ github.repository }}
      - if: always()
        name: Converts test report
        run: |
          if [ ! -f "molecule-${{ matrix.scenario }}-report.html" ]; then
            echo "Report file not found, skipping conversion"
            exit 0
          fi
          # Process the HTML file, remove the first table, and convert to Markdown
          awk '
            BEGIN {skip=0; table_removed=0}

            /<table class="grid">/ {
                if (table_removed == 0) {
                    skip=1
                    next
                }
            }

            skip && /<\/table>/ {
                if (table_removed == 0) {
                    skip=0
                    table_removed=1
                    next
                }
            }

            skip {next}

            {print}
          ' "molecule-${{ matrix.scenario }}-report.html" | pandoc -f html -t markdown_strict | awk '
            /^## / {gsub(/^## /, "#### ")}

            {gsub(/<strong>/, ""); gsub(/<\/strong>/, "")}

            /error/ {gsub("error", "❌ error")}
            /warning/ {gsub("warning", "⚠️ warning")}
            /information/ {gsub("information", "ℹ️ information")}
            /hint/ {gsub("hint", "ℹ️ hint")}
            /Process Info/ {gsub("Process Info", "🔹 Process Info")}
            /Slicing Information/ {gsub("Slicing Information", "✂️ Slicing Info")}

            {print}
          ' >> "$GITHUB_STEP_SUMMARY"
        working-directory: ${{ github.repository }}
      - if: ${{ failure() && runner.debug == '1' }}
        uses: mxschmitt/action-tmate@v3
    timeout-minutes: 40
