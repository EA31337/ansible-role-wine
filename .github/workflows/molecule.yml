---
# Note: Keep keys and envs in alphabetical order.
name: Molecule

# yamllint disable-line rule:truthy
on:
  pull_request:
    paths-ignore:
      - '.github/workflows/**'
      - '**.cfg'
      - '**.md'
      - '.*'
      - LICENSE
      - Pipfile*
  push:
    paths-ignore:
      - '.github/workflows/**'
      - '**.cfg'
      - '**.md'
      - '.*'
      - LICENSE
      - Pipfile*

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  actions: write
  contents: read

jobs:
  test:
    name: ${{ matrix.scenario }} / ${{ matrix.platform }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    strategy:
      fail-fast: true
      matrix:
        platform:
          - alpine-latest
          - debian-latest
          - nixos-latest
          - ubuntu-jammy
          - ubuntu-noble
          - ubuntu-latest
        scenario:
          - default
          - devel
          - staging
          - winetricks
    steps:
      - uses: actions/checkout@v6
        with:
          path: ${{ github.repository }}
      - name: Cache Ansible Galaxy collections
        uses: actions/cache@v4
        with:
          key: galaxy-${{ hashFiles(format('{0}/requirements.yml', github.repository)) }}
          path: ${{ github.repository }}/collections
      - name: Install Ansible collections
        run: |
          pip install ansible-core
          ansible-galaxy collection install -r requirements.yml -p collections
        working-directory: ${{ github.repository }}
      - name: Filter molecule platforms to ${{ matrix.platform }}
        # yq is pre-installed on ubuntu-latest GitHub-hosted runners.
        run: |
          SCENARIO="${{ matrix.scenario }}"
          PLATFORM="${{ matrix.platform }}"
          MOL_FILE="molecule/${SCENARIO}/molecule.yml"
          yq -i \
            ".platforms = [.platforms[] | select(.name == \"${PLATFORM}\")]" \
            "$MOL_FILE"
          echo "Filtered platforms:"
          yq '.platforms[].name' "$MOL_FILE"
        working-directory: ${{ github.repository }}
      - name: Run Molecule test
        uses: gofrolist/molecule-action@v2
        env:
          ANSIBLE_COLLECTIONS_PATH: >-
            ${{ github.workspace }}/${{ github.repository }}/collections
          ANSIBLE_CALLBACK_RESULT_FORMAT: yaml
          ANSIBLE_FORCE_COLOR: '1'
          ANSIBLE_STDOUT_CALLBACK: >-
            ${{ runner.debug == '1' && 'debug' || 'ansible.builtin.default' }}
        with:
          molecule_args: >-
            --scenario-name ${{ matrix.scenario }}
          molecule_command: test
          molecule_options: ${{ runner.debug == '1' && '--verbose' || '' }}
          molecule_working_dir: ${{ github.repository }}
      - if: ${{ failure() && runner.debug == '1' }}
        uses: mxschmitt/action-tmate@v3
    timeout-minutes: 120

  summary:
    name: Results
    if: always()
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Build results table
        uses: actions/github-script@v7
        with:
          script: |
            const { data: { jobs } } = await github.rest.actions
              .listJobsForWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
                per_page: 100,
              });

            // Keep in sync with the strategy.matrix above.
            const scenarios = ['default', 'devel', 'staging', 'winetricks'];
            const platforms = [
              'alpine-latest',
              'debian-latest',
              'nixos-latest',
              'ubuntu-jammy',
              'ubuntu-noble',
              'ubuntu-latest',
            ];

            const icon = (c) => ({
              success: '✅', failure: '❌', cancelled: '⚪', skipped: '⏭️',
            }[c] || '❓');

            const lookup = {};
            for (const job of jobs) {
              lookup[job.name] = job.conclusion;
            }

            const tableData = [
              ['Platform', ...scenarios].map((data) => ({ data, header: true })),
              ...platforms.map((p) => [
                `\`${p}\``,
                ...scenarios.map((s) => icon(lookup[`${s} / ${p}`])),
              ]),
            ];

            await core.summary
              .addHeading('Molecule Test Results', 2)
              .addTable(tableData)
              .write();
