---
# Note: Keep keys and envs in alphabetical order.
name: Molecule

# yamllint disable-line rule:truthy
on:
  pull_request:
    paths-ignore:
      - '.devcontainer/**'
      - '.github/workflows/cogni-ai-agent.yml'
      - '.github/workflows/copilot-setup-steps.yml'
      - '.github/workflows/galaxy-publish.yml'
      - '**.cfg'
      - '**.md'
      - '.*'
      - LICENSE
      - Pipfile*
  push:
    paths-ignore:
      - '.devcontainer/**'
      - '.github/workflows/cogni-ai-agent.yml'
      - '.github/workflows/copilot-setup-steps.yml'
      - '.github/workflows/galaxy-publish.yml'
      - '**.cfg'
      - '**.md'
      - '.*'
      - LICENSE
      - Pipfile*

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  actions: write
  contents: read

jobs:
  test:
    name: ${{ matrix.scenario }} / ${{ matrix.platform }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    strategy:
      fail-fast: true
      matrix:
        platform:
          - alpine-latest
          - debian-latest
          - nixos-latest
          - ubuntu-jammy
          - ubuntu-noble
          - ubuntu-latest
        scenario:
          - default
          - devel
          - staging
          - winetricks
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false  # Prevents Duplicate header: "Authorization" error.
      - name: Cache Ansible Galaxy collections
        uses: actions/cache@v5
        with:
          key: ${{ runner.os }}-galaxy-${{ hashFiles('requirements.yml') }}
          path: collections
          restore-keys: |
            ${{ runner.os }}-galaxy-
      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('Pipfile*') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install Ansible collections
        run: |
          pip install ansible-core
          ansible-galaxy collection install -r requirements.yml -p collections
      - name: Filter molecule platforms to ${{ matrix.platform }}
        # yq is pre-installed on ubuntu-latest GitHub-hosted runners.
        run: |
          SCENARIO="${{ matrix.scenario }}"
          PLATFORM="${{ matrix.platform }}"
          MOL_FILE="molecule/${SCENARIO}/molecule.yml"
          yq -i \
            ".platforms = [.platforms[] | select(.name == \"${PLATFORM}\")]" \
            "$MOL_FILE"
          echo "Filtered platforms:"
          yq '.platforms[].name' "$MOL_FILE"
      - name: Run Molecule test
        uses: gofrolist/molecule-action@v2
        env:
          ANSIBLE_COLLECTIONS_PATH: collections
          ANSIBLE_DISPLAY_OK_HOSTS: 'no'
          ANSIBLE_DISPLAY_SKIPPED_HOSTS: 'no'
          ANSIBLE_FORCE_COLOR: '1'
          ANSIBLE_STDOUT_CALLBACK: >-
            ${{ runner.debug == '1' && 'debug' || 'community.general.unixy' }}
          MOLECULE_REPORT: molecule-${{ matrix.scenario }}-report.html
        with:
          molecule_args: >-
            --scenario-name ${{ matrix.scenario }}
          molecule_command: test
          molecule_options: ${{ runner.debug == '1' && '--verbose' || '' }}
          molecule_working_dir: .
      - if: always()
        name: Summarize Molecule report
        run: |
          REPORT="molecule-${{ matrix.scenario }}-report.html"
          if [ -f "$REPORT" ]; then
            # Fix permissions (the file might be owned by root if created in a container).
            sudo chown "$USER":"$USER" "$REPORT" || true

            {
              echo "## Molecule Summary - ${{ matrix.scenario }}"
              echo ""
              # Extract Play Recap
              echo "### Play Recap"
              echo '```'
              sed 's/<[^>]*>//g; s/&nbsp;/ /g; s/&lt;/</g; s/&gt;/>/g; s/&amp;/\&/g' "$REPORT" | \
                awk '/PLAY RECAP/ {p=1} p; /^[[:space:]]*$/ && p {p=0}' | \
                grep -v "^$" | head -n 20
              echo '```'

              # Extract Errors and Warnings
              echo "<details><summary>Errors and Warnings (click to expand)</summary>"
              echo ""
              echo '```'
              sed 's/<[^>]*>//g; s/&nbsp;/ /g; s/&lt;/</g; s/&gt;/>/g; s/&amp;/\&/g' "$REPORT" | \
                grep -iE "error|warning|fail" | grep -vE "ok=|changed=" | head -n 50
              echo '```'
              echo "</details>"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
      - if: always()
        name: Upload Molecule report artifact
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: warn
          name: molecule-${{ matrix.scenario }}-${{ matrix.platform }}-report
          path: molecule-${{ matrix.scenario }}-report.html
      - if: ${{ failure() && runner.debug == '1' }}
        uses: mxschmitt/action-tmate@v3
    timeout-minutes: 120

  summary:
    name: Results
    if: always()
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Build results table
        uses: actions/github-script@v7
        with:
          script: |
            const { data: { jobs } } = await github.rest.actions
              .listJobsForWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
                per_page: 100,
              });

            // Keep in sync with the strategy.matrix above.
            const scenarios = ['default', 'devel', 'staging', 'winetricks'];
            const platforms = [
              'alpine-latest',
              'debian-latest',
              'nixos-latest',
              'ubuntu-jammy',
              'ubuntu-noble',
              'ubuntu-latest',
            ];

            const icon = (c) => ({
              success: '✅', failure: '❌', cancelled: '⚪', skipped: '⏭️',
            }[c] || '❓');

            const lookup = {};
            for (const job of jobs) {
              lookup[job.name] = job.conclusion;
            }

            const tableData = [
              ['Platform', ...scenarios].map((data) => ({ data, header: true })),
              ...platforms.map((p) => [
                `\`${p}\``,
                ...scenarios.map((s) => icon(lookup[`${s} / ${p}`])),
              ]),
            ];

            await core.summary
              .addHeading('Molecule Test Results', 2)
              .addTable(tableData)
              .write();
