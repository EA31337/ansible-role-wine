---
# Molecule configuration file.
# Dependency management (download roles/collections)
# Note: Keep YAML keys sorted alphabetically.
dependency:
  name: galaxy
  options:
    ignore-certs: false
    ignore-errors: false
    requirements-file: requirements.yml
    role-file: requirements.yml
driver:
  name: docker
lint: |
  set -e
  yamllint .
  molecule syntax
  ansible-lint
platforms:
  - name: alpine-latest
    image: alpine:3.20
    init: true
  - name: debian-latest
    image: debian:latest
    init: true
  - name: nixos-latest
    dockerfile: ../resources/playbooks/Dockerfile.j2
    image: nixos/nix:latest
    pre_build_image: false
    privileged: true
    init: true
  - name: ubuntu-jammy
    image: ubuntu:jammy
    init: true
  - name: ubuntu-noble
    image: ubuntu:noble
    init: true
  - name: ubuntu-latest
    image: ubuntu:latest
    init: true
provisioner:
  config_options:
    defaults:
      host_key_checking: false
      # Use the built-in default callback with result_format instead of community.general.yaml
      result_format: yaml
      stdout_callback: ansible.builtin.default
      verbosity: 1
  env:
    ANSIBLE_FORCE_COLOR: "1"
    ANSIBLE_LOAD_CALLBACK_PLUGINS: "1"
  inventory:
    group_vars:
      all:
    host_vars:
      nixos-latest:
        ansible_python_interpreter: /root/.nix-profile/bin/python3
        wine_version: '10.0'
      ubuntu-jammy:
        wine_release_codename: jammy
        wine_version: "10.0"
      ubuntu-noble:
        wine_release_codename: jammy
        wine_version: "10.0"
      ubuntu-latest:
        wine_release_codename: jammy
        wine_version: "10.0"
  name: ansible
  options:
    diff: true
    force-handlers: true
  playbooks:
    converge: converge.yml
    create: create.yml
    destroy: destroy.yml
    prepare: prepare.yml
    verify: verify.yml
  ssh_connection:
    pipelining: true

scenario:
  name: default
  test_sequence:
    - dependency
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy
verifier:
  name: ansible
