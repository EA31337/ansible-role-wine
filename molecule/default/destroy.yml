---
# Molecule destroy playbook for Docker driver.
- name: Destroy
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    # Use controller Python (Ansible's interpreter)
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
  vars_files:
    - ../../vars/main.yml
  pre_tasks:
    - name: Ensure Python dependencies are installed on controller
      ansible.builtin.command:
        cmd: "{{ ansible_playbook_python }} -m pip install -q docker>=7.1 requests"
      register: pip_install_result
      changed_when: pip_install_result.rc == 0 and 'Successfully installed' in pip_install_result.stdout
      no_log: "{{ wine_no_log }}"

  tasks:
    - name: Stop and remove test containers
      community.docker.docker_container:
        name: "{{ item.name }}"
        state: absent
      loop: "{{ molecule_yml.platforms }}"
      loop_control:
        label: "{{ item.name }}"
      no_log: "{{ wine_no_log }}"
      register: container_results
      async: 7200
      poll: 0

    - name: Wait for instance(s) deletion to complete
      ansible.builtin.async_status:
        jid: "{{ item.ansible_job_id }}"
      loop: "{{ container_results.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      register: async_results
      until: async_results.finished
      retries: 300
      no_log: "{{ wine_no_log }}"

    - name: Remove molecule instance config
      ansible.builtin.file:
        path: "{{ molecule_ephemeral_directory }}/instance_config.yml"
        state: absent
