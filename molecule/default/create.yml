---
# Molecule create playbook for Docker driver.
- name: Create
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    # Use controller Python (Ansible's interpreter)
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
    host_ca_certs: []

  tasks:
    - name: Ensure Python dependencies are installed on controller
      ansible.builtin.command:
        cmd: "{{ ansible_playbook_python }} -m pip install docker>=7.1 requests"
      register: pip_install_result
      changed_when: pip_install_result.rc == 0 and 'Successfully installed' in pip_install_result.stdout

    - name: Discover proxy CA certificates on the host
      ansible.builtin.set_fact:
        host_ca_certs: >-
          {{
            (lookup('ansible.builtin.fileglob', '/usr/local/share/ca-certificates/*.crt', wantlist=True) +
             lookup('ansible.builtin.fileglob', '/etc/pki/ca-trust/source/anchors/*.crt', wantlist=True) +
             lookup('ansible.builtin.fileglob', '/etc/ca-certificates/trust-source/anchors/*.crt', wantlist=True))
            | unique
          }}

    - name: Prepare build context for custom images and CA certificates
      when:
        - (molecule_yml.platforms | selectattr('dockerfile', 'defined') | list | length > 0) or
          (host_ca_certs | length > 0)
      block:
        - name: Ensure build context directory exists
          ansible.builtin.file:
            path: "{{ molecule_ephemeral_directory }}/ca-certificates"
            state: directory
            mode: "0755"

        - name: Copy host CA certificates to build context
          ansible.builtin.copy:
            src: "{{ item }}"
            dest: "{{ molecule_ephemeral_directory }}/ca-certificates/"
            mode: "0644"
          loop: "{{ host_ca_certs }}"
          loop_control:
            label: "{{ item | basename }}"

        - name: Render Dockerfiles
          ansible.builtin.template:
            src: "{{ item.dockerfile }}"
            dest: "{{ molecule_ephemeral_directory }}/{{ item.name }}.Dockerfile"
            mode: "0644"
          loop: "{{ molecule_yml.platforms | selectattr('dockerfile', 'defined') | list }}"
          loop_control:
            label: "{{ item.name }}"

        - name: Build custom images
          community.docker.docker_image:
            name: "{{ item.name }}"
            tag: molecule
            build:
              path: "{{ molecule_ephemeral_directory }}"
              dockerfile: "{{ item.name }}.Dockerfile"
            source: build
            force_source: true
          loop: "{{ molecule_yml.platforms | selectattr('dockerfile', 'defined') | list }}"
          loop_control:
            label: "{{ item.name }}"
          no_log: "{{ ansible_verbosity | default(0) < 1 }}"

    - name: Ensure test containers are running
      community.docker.docker_container:
        name: "{{ item.name }}"
        image: "{{ (item.name ~ ':molecule') if item.dockerfile is defined else item.image }}"
        command: sleep infinity
        init: "{{ item.init | default(omit) }}"
        # NixOS containers require privileged mode due to non-standard filesystem layout.
        privileged: "{{ item.privileged | default('nixos' in item.name) }}"
        # Relaxed seccomp/apparmor for NixOS compatibility.
        security_opts: "{{ ['seccomp=unconfined', 'apparmor=unconfined'] if 'nixos' in item.name else omit }}"
        recreate: true
        pull: "{{ false if (item.dockerfile is defined or 'nixos' in item.name) else true }}"
        # Mount host CA certificates for proxy/firewall SSL interception environments.
        volumes: >-
          {{ [molecule_ephemeral_directory ~ '/ca-certificates:/usr/local/share/ca-certificates:ro']
             if host_ca_certs | length > 0 else omit }}
      loop: "{{ molecule_yml.platforms }}"
      loop_control:
        label: "{{ item.name }}"
      no_log: "{{ ansible_verbosity | default(0) < 1 }}"
      register: container_results
      async: 7200
      poll: 0

    - name: Wait for container(s) creation to complete
      ansible.builtin.async_status:
        jid: "{{ item.ansible_job_id }}"
      loop: "{{ container_results.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      register: async_job_results
      until: async_job_results.finished
      retries: 300
      delay: 5
      no_log: "{{ ansible_verbosity | default(0) < 1 }}"

    - name: Write molecule instance config
      ansible.builtin.copy:
        content: |
          {% set instance_conf = [] %}
          {% for item in molecule_yml.platforms %}
          {%   set _ = instance_conf.append({
                 'instance': item.name,
                 'address': item.name,
                 'user': 'root',
                 'port': '22',
                 'identity_file': ''
               }) %}
          {% endfor %}
          {{ instance_conf | to_nice_yaml(indent=2) }}
        dest: "{{ molecule_ephemeral_directory }}/instance_config.yml"
        mode: "0644"
