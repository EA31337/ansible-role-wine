---
# Molecule create playbook for Docker driver.
- name: Create
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    # Use controller Python (Ansible's interpreter)
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
  pre_tasks:
    - name: Ensure Python dependencies are installed on controller
      ansible.builtin.command:
        cmd: "{{ ansible_playbook_python }} -m pip install docker>=7.1 requests"
      register: pip_install_result
      changed_when: pip_install_result.rc == 0 and 'Successfully installed' in pip_install_result.stdout

  tasks:
    - name: Check for proxy CA certificates on the host
      ansible.builtin.find:
        paths: /usr/local/share/ca-certificates
        patterns: "*.crt"
      register: host_ca_certs
      failed_when: false

    - name: Render Dockerfiles for custom images
      ansible.builtin.template:
        src: "{{ item.dockerfile }}"
        dest: "{{ molecule_ephemeral_directory }}/{{ item.name }}.Dockerfile"
        mode: "0644"
      loop: "{{ molecule_yml.platforms }}"
      when: item.dockerfile is defined

    - name: Create ca-certificates directory in build context
      ansible.builtin.file:
        path: "{{ molecule_ephemeral_directory }}/ca-certificates"
        state: directory
        mode: "0755"

    - name: Copy host CA certificates to build context (for proxy environments)
      ansible.builtin.copy:
        src: "{{ item.path }}"
        dest: "{{ molecule_ephemeral_directory }}/ca-certificates/{{ item.path | basename }}"
        mode: "0644"
      loop: "{{ host_ca_certs.files | default([]) }}"
      when: (host_ca_certs.files | default([])) | length > 0

    - name: Build custom images when dockerfile is provided
      community.docker.docker_image:
        name: "{{ item.image }}"
        build:
          path: "{{ molecule_ephemeral_directory }}"
          dockerfile: "{{ item.name }}.Dockerfile"
        source: build
        force_source: true
      loop: "{{ molecule_yml.platforms }}"
      when: item.dockerfile is defined

    - name: Ensure test containers are running
      community.docker.docker_container:
        name: "{{ item.name }}"
        image: "{{ item.image }}"
        command: sleep infinity
        init: "{{ item.init | default(omit) }}"
        # NixOS containers require privileged mode due to non-standard filesystem layout.
        privileged: "{{ item.privileged | default('nixos' in item.name) }}"
        # Relaxed seccomp/apparmor for NixOS compatibility.
        security_opts: >-
          {{ ['seccomp=unconfined', 'apparmor=unconfined']
          if 'nixos' in item.name else omit }}
        recreate: true
        pull: "{{ false if (item.dockerfile is defined or 'nixos' in item.name) else true }}"
        # Mount host CA certificates for proxy/firewall SSL interception environments.
        volumes: >-
          {{ (host_ca_certs.files | default([]))
             | map(attribute='path')
             | map('regex_replace', '^(.*)$', '\1:\1:ro')
             | list
             or omit }}
      loop: "{{ molecule_yml.platforms }}"

    - name: Build instance config entries
      ansible.builtin.set_fact:
        instance_conf_dict:
          instance: "{{ item.name }}"
          address: "{{ item.name }}"
          user: root
          port: "22"
          identity_file: ""
      loop: "{{ molecule_yml.platforms }}"
      register: instance_config_dict

    - name: Convert registered data to list
      ansible.builtin.set_fact:
        instance_conf: >-
          {{ instance_config_dict.results
             | map(attribute='ansible_facts.instance_conf_dict')
             | list }}

    - name: Write molecule instance config
      ansible.builtin.copy:
        content: "{{ instance_conf | to_nice_yaml(indent=2) }}"
        dest: "{{ molecule_ephemeral_directory }}/instance_config.yml"
        mode: "0644"
