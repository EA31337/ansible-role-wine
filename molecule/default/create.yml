---
# Molecule create playbook for Docker driver.
- name: Create
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    # Use controller Python (Ansible's interpreter)
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
  pre_tasks:
    - name: Ensure requests is installed on controller
      ansible.builtin.command:
        cmd: "{{ ansible_playbook_python }} -m pip install --user requests"
      changed_when: "'Successfully installed' in pip_install_result.stdout"
      register: pip_install_result

  tasks:
    - name: Render Dockerfiles for custom images
      ansible.builtin.template:
        src: "{{ item.dockerfile }}"
        dest: "{{ molecule_ephemeral_directory }}/{{ item.name }}.Dockerfile"
        mode: "0644"
      loop: "{{ molecule_yml.platforms }}"
      when: item.dockerfile is defined

    - name: Build custom images when dockerfile is provided
      community.docker.docker_image:
        name: "{{ item.image }}"
        build:
          path: "{{ molecule_ephemeral_directory }}"
          dockerfile: "{{ item.name }}.Dockerfile"
        source: build
        force_source: true
      loop: "{{ molecule_yml.platforms }}"
      when: item.dockerfile is defined

    - name: Ensure test containers are running
      community.docker.docker_container:
        name: "{{ item.name }}"
        image: "{{ item.image }}"
        command: sleep infinity
        # NixOS containers require privileged mode due to non-standard filesystem layout.
        privileged: "{{ 'nixos' in item.name }}"
        # Relaxed seccomp/apparmor for NixOS compatibility.
        security_opts: >-
          {{ ['seccomp=unconfined', 'apparmor=unconfined']
          if 'nixos' in item.name else omit }}
        recreate: true
        pull: "{{ false if 'nixos' in item.name else true }}"
      loop: "{{ molecule_yml.platforms }}"

    - name: Build instance config entries
      ansible.builtin.set_fact:
        instance_conf_dict:
          instance: "{{ item.name }}"
          address: "{{ item.name }}"
          user: root
          port: "22"
          identity_file: ""
      loop: "{{ molecule_yml.platforms }}"
      register: instance_config_dict

    - name: Convert registered data to list
      ansible.builtin.set_fact:
        instance_conf: >-
          {{ instance_config_dict.results
             | map(attribute='ansible_facts.instance_conf_dict')
             | list }}

    - name: Write molecule instance config
      ansible.builtin.copy:
        content: "{{ instance_conf | to_nice_yaml(indent=2) }}"
        dest: "{{ molecule_ephemeral_directory }}/instance_config.yml"
        mode: "0644"
