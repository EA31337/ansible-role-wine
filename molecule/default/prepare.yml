---
- name: Prepare hosts
  hosts: all
  gather_facts: false
  tasks:

    - name: Bootstrap Python and Sudo
      ansible.builtin.raw: |
        if command -v python3 >/dev/null 2>&1 || command -v python >/dev/null 2>&1; then
          if command -v sudo >/dev/null 2>&1 || [ -d /nix ]; then
            exit 0
          fi
        fi
        if command -v apk >/dev/null 2>&1; then
          apk add --no-cache python3 py3-pip sudo ca-certificates
        elif command -v apt-get >/dev/null 2>&1; then
          if grep -qi '^ID=ubuntu' /etc/os-release 2>/dev/null; then
            mirror="http://azure.archive.ubuntu.com/ubuntu"
            sed -i "s|http://.*.ubuntu.com/ubuntu|$mirror|g" /etc/apt/sources.list
          fi
          apt-get update -qq && \
            DEBIAN_FRONTEND=noninteractive apt-get install -y -q python3-minimal sudo ca-certificates
        elif command -v nix-env >/dev/null 2>&1; then
          mkdir -p /etc/nix
          [ -f /etc/nix/nix.conf ] || touch /etc/nix/nix.conf
          if grep -q '^sandbox =' /etc/nix/nix.conf; then
            sed -i 's/^sandbox =.*/sandbox = false/' /etc/nix/nix.conf
          else
            printf "sandbox = false\n" >> /etc/nix/nix.conf
          fi
          export NIX_CONFIG="sandbox = false"
          nix-env --option sandbox false -iA nixpkgs.python3 nixpkgs.python3Packages.pip nixpkgs.procps
        elif command -v dnf >/dev/null 2>&1; then
          dnf install -y python3 sudo ca-certificates
        elif command -v zypper >/dev/null 2>&1; then
          zypper --non-interactive install python3 sudo ca-certificates
        fi
      changed_when: false

    - name: Trust proxy CA certificates (if mounted)
      ansible.builtin.raw: |
        if ! ls /usr/local/share/ca-certificates/*.crt >/dev/null 2>&1; then
          exit 0
        fi
        if [ -d /nix ] && [ -d /etc/nix ]; then
          combined="/etc/nix/ca-bundle.crt"
          nix_bundle="/nix/var/nix/profiles/default/etc/ssl/certs/ca-bundle.crt"
          if [ -f "$nix_bundle" ]; then
            mkdir -p /etc/nix
            cp "$nix_bundle" "$combined"
            cat /usr/local/share/ca-certificates/*.crt >> "$combined"
            grep -q 'ssl-cert-file' /etc/nix/nix.conf 2>/dev/null || \
              printf "ssl-cert-file = %s\n" "$combined" >> /etc/nix/nix.conf
          fi
        elif [ -x "$(command -v update-ca-certificates)" ]; then
          if [ -d /usr/share/ca-certificates ]; then
            cp /usr/local/share/ca-certificates/*.crt /usr/share/ca-certificates/
            if [ -f /etc/ca-certificates.conf ]; then
              for f in /usr/local/share/ca-certificates/*.crt; do
                b=$(basename "$f")
                grep -q "^$b" /etc/ca-certificates.conf 2>/dev/null || echo "$b" >> /etc/ca-certificates.conf
              done
            fi
          fi
          update-ca-certificates
          [ -d /etc/ssl/certs ] && chmod 755 /etc/ssl/certs || true
        fi
      changed_when: false
