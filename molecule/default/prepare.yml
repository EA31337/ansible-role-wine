---
- name: Prepare hosts
  hosts: "all:!nixos*"
  gather_facts: false
  tasks:

    - name: Ensure sudo is installed
      ansible.builtin.raw: |
        if command -v sudo >/dev/null 2>&1; then
          exit 0
        elif command -v apk >/dev/null 2>&1; then
          apk add --no-cache sudo
        elif command -v apt-get >/dev/null 2>&1; then
          apt-get update -qq && apt-get install -y -q sudo
        elif command -v dnf >/dev/null 2>&1; then
          dnf install -y sudo
        elif command -v zypper >/dev/null 2>&1; then
          zypper --non-interactive install sudo
        else
          echo "No supported package manager found to install sudo" >&2
          exit 1
        fi
      changed_when: false

    - name: Trust proxy CA certificates (if mounted)
      ansible.builtin.raw: |
        if ls /usr/local/share/ca-certificates/*.crt >/dev/null 2>&1; then
          if command -v apk >/dev/null 2>&1; then
            apk add --no-cache ca-certificates
            cp /usr/local/share/ca-certificates/*.crt /usr/share/ca-certificates/ 2>/dev/null || true
            update-ca-certificates 2>/dev/null
          elif command -v apt-get >/dev/null 2>&1; then
            apt-get update -qq && apt-get install -y -q ca-certificates
            for f in /usr/local/share/ca-certificates/*.crt; do
              name=$(basename "$f")
              cp "$f" "/usr/share/ca-certificates/$name"
              grep -qxF "$name" /etc/ca-certificates.conf 2>/dev/null || \
                echo "$name" >> /etc/ca-certificates.conf
            done
            update-ca-certificates
            # Ensure /etc/ssl/certs is world-readable (for _apt user).
            chmod 755 /etc/ssl/certs
          elif command -v update-ca-certificates >/dev/null 2>&1; then
            update-ca-certificates
          fi
        fi
      changed_when: false

    - name: Install Python for Ansible
      ansible.builtin.raw: |
        if command -v python3 >/dev/null 2>&1 || command -v python >/dev/null 2>&1; then
          exit 0
        elif command -v apk >/dev/null 2>&1; then
          apk add --no-cache python3 py3-pip
        elif command -v apt-get >/dev/null 2>&1; then
          apt-get update -qq && apt-get install -y -q python3-minimal
        elif command -v dnf >/dev/null 2>&1; then
          dnf install -y python3
        elif command -v zypper >/dev/null 2>&1; then
          zypper --non-interactive install python3
        else
          echo "No supported package manager found" >&2
          exit 1
        fi
      changed_when: false

- name: Prepare NixOS hosts
  hosts: "nixos*"
  gather_facts: false
  tasks:

    - name: Install Python for Ansible on NixOS
      ansible.builtin.raw: |
        if command -v python3 >/dev/null 2>&1 || command -v python >/dev/null 2>&1; then
          exit 0
        fi
        mkdir -p /etc/nix
        touch /etc/nix/nix.conf
        if grep -q '^sandbox =' /etc/nix/nix.conf; then
          sed -i 's/^sandbox =.*/sandbox = false/' /etc/nix/nix.conf
        else
          printf "sandbox = false\n" >> /etc/nix/nix.conf
        fi
        export NIX_CONFIG="sandbox = false"
        nix-env --option sandbox false \
          -iA nixpkgs.python3 nixpkgs.python3Packages.pip
      changed_when: false

    - name: Trust proxy CA certificates on NixOS (if mounted)
      ansible.builtin.raw: |
        if ls /usr/local/share/ca-certificates/*.crt >/dev/null 2>&1; then
          nix_bundle="/nix/var/nix/profiles/default/etc/ssl/certs/ca-bundle.crt"
          combined="/etc/nix/ca-bundle.crt"
          mkdir -p /etc/nix
          if [ ! -f "$combined" ]; then
            cp "$nix_bundle" "$combined"
          fi
          for cert in /usr/local/share/ca-certificates/*.crt; do
            cat "$cert" >> "$combined" 2>/dev/null || true
          done
          if ! grep -q 'ssl-cert-file' /etc/nix/nix.conf 2>/dev/null; then
            printf "ssl-cert-file = %s\n" "$combined" >> /etc/nix/nix.conf
          fi
        fi
      changed_when: false
