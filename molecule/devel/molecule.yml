---
# Molecule configuration file.
# Dependency management (download roles/collections)
# Note: Keep YAML keys sorted alphabetically.
dependency:
  name: galaxy
  options:
    ignore-certs: false
    ignore-errors: false
    requirements-file: requirements.yml
    role-file: requirements.yml
driver:
  name: docker
lint: |
  set -e
  yamllint .
  molecule syntax
  ansible-lint
platforms:
  - name: alpine-latest
    image: alpine:3.20
    init: true
  - name: debian-latest
    image: debian:latest
    init: true
  - name: nixos-latest
    dockerfile: ../resources/playbooks/Dockerfile.j2
    image: nixos/nix:latest
    init: true
    pre_build_image: false
    privileged: true
  - name: ubuntu-jammy
    image: ubuntu:jammy
    init: true
  - name: ubuntu-noble
    image: ubuntu:noble
    init: true
provisioner:
  config_options:
    defaults:
      # Workaround for molecule-docker 2.1.0 using non-boolean conditionals
      # in its create/destroy playbooks (e.g. `when: (lookup('env', 'HOME'))`).
      # See: https://github.com/ansible-community/molecule-plugins/issues/295
      allow_broken_conditionals: true
      callbacks_enabled: ansible.posix.profile_tasks
      # Ensure collections installed to ./collections are found by ansible-playbook.
      collections_path: ${MOLECULE_PROJECT_DIRECTORY}/collections:~/.ansible/collections:/usr/share/ansible/collections
      host_key_checking: false
      # Use the built-in default callback with result_format instead of community.general.yaml
      result_format: yaml
      stdout_callback: ansible.builtin.default
      verbosity: 1
  env:
    ANSIBLE_FORCE_COLOR: "1"
    ANSIBLE_LOAD_CALLBACK_PLUGINS: "1"
  inventory:
    group_vars:
      all:
        wine_install_winetricks: true
        wine_install_recommends: true
        wine_release: devel
    host_vars:
      debian-latest:
        wine_release_codename: bookworm
        wine_version: "10.0"
      nixos-latest:
        ansible_python_interpreter: /root/.nix-profile/bin/python3
        wine_version: "10.0"
      ubuntu-jammy:
        wine_release_codename: jammy
        wine_version: "10.0"
      ubuntu-noble:
        wine_release_codename: jammy
        wine_version: "10.0"
      ubuntu-latest:
        wine_release_codename: jammy
        wine_version: "10.0"
  name: ansible
  options:
    diff: true
    force-handlers: true
  playbooks:
    converge: ../default/converge.yml
    create: ../default/create.yml
    destroy: ../default/destroy.yml
    prepare: ../default/prepare.yml
    verify: ../default/verify.yml
  ssh_connection:
    pipelining: true
scenario:
  name: devel
  test_sequence:
    - dependency
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - verify
    - destroy
verifier:
  name: ansible
